name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Build backend
        run: npm run build

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3333
          NEXT_PUBLIC_APP_COMMIT_SHA: ${{ github.sha }}
          NEXT_PUBLIC_APP_VERSION: ci-${{ github.run_number }}
        run: npm run build

  backend-docker:
    runs-on: ubuntu-latest
    needs:
      - backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t clinity-backend:ci ./backend
