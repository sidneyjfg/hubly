name: Frontend CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3333
          NEXT_PUBLIC_APP_COMMIT_SHA: ${{ github.sha }}
          NEXT_PUBLIC_APP_LAYER_LABEL: ci-${{ github.run_number }}
        run: npm run build

  frontend-docker:
    runs-on: ubuntu-latest
    needs:
      - frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build frontend image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=http://localhost:3333 \
            --build-arg NEXT_PUBLIC_APP_COMMIT_SHA=${{ github.sha }} \
            --build-arg NEXT_PUBLIC_APP_LAYER_LABEL=ci-${{ github.run_number }} \
            -t hubly-frontend:ci \
            ./frontend
